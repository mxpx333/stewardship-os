<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stewardship OS</title>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --green-bg: rgba(63,185,80,0.1);
  --amber: #d29922; --amber-bg: rgba(210,153,34,0.1);
  --red: #f85149; --red-bg: rgba(248,81,73,0.1);
  --purple: #bc8cff; --purple-bg: rgba(188,140,255,0.1);
  --blue-bg: rgba(88,166,255,0.1);
  --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; padding: 16px; max-width: 640px; margin: 0 auto; -webkit-tap-highlight-color: transparent; }

/* Verse Bar */
.verse-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 12px; text-align: center; font-style: italic; color: var(--text-dim); font-size: 13px; line-height: 1.6; }
.verse-bar .verse-ref { display: block; margin-top: 6px; font-style: normal; font-weight: 600; color: var(--purple); font-size: 11px; }

/* Date Carousel */
.date-carousel { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 8px 0; margin-bottom: 8px; }
.date-arrow { background: none; border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.date-arrow:active { background: var(--border); }
.date-arrow.disabled { opacity: 0.25; pointer-events: none; }
.date-label { font-size: 16px; font-weight: 700; min-width: 200px; text-align: center; letter-spacing: -0.3px; }
.date-back-btn { background: none; border: none; color: var(--blue); font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); display: block; text-align: center; margin-bottom: 8px; }

/* Reading Card */
.reading-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.reading-book { font-size: 15px; font-weight: 700; color: var(--purple); }
.reading-method { font-size: 11px; color: var(--text-dim); }
.reading-progress { font-size: 11px; color: var(--text-dim); text-align: right; }
.reading-pct { font-size: 13px; font-weight: 600; color: var(--text); }

/* Header */
.header { text-align: center; margin-bottom: 16px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.header .subtitle { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

/* Scoreboard */
.scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.score-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
.score-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.score-card .value { font-size: 24px; font-weight: 700; }
.score-card .sub { font-size: 10px; color: var(--text-dim); }

/* Section Headers */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; margin-top: 20px; }
.section-header h2 { font-size: 14px; font-weight: 600; }
.section-header .count { font-size: 11px; color: var(--text-dim); }

/* Flow Checklist */
.flow-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s; }
.flow-item.done { border-color: var(--green); opacity: 0.7; }
.flow-item.current { border-color: var(--blue); }
.flow-row { display: flex; align-items: center; padding: 14px 14px; gap: 10px; cursor: pointer; min-height: 52px; }
.flow-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
.flow-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; transition: all 0.15s; }
.flow-item.done .flow-check { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.flow-time { font-size: 11px; color: var(--text-dim); width: 60px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.flow-label { flex: 1; font-size: 13px; font-weight: 500; }
.flow-item.done .flow-label { text-decoration: line-through; color: var(--text-dim); }
.flow-hint { font-size: 11px; color: var(--text-dim); font-style: italic; }
.flow-badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
.flow-badge.on-time { background: var(--green-bg); color: var(--green); }
.flow-badge.late { background: var(--amber-bg); color: var(--amber); }

/* SOAP Journal */
.soap-panel { padding: 0 14px 14px; display: none; }
.soap-panel.open { display: block; }
.soap-field { margin-bottom: 8px; }
.soap-field label { display: block; font-size: 11px; color: var(--purple); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.soap-field input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); outline: none; margin-bottom: 6px; }
.soap-field input[type="text"]:focus { border-color: var(--purple); }
.soap-field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); resize: vertical; min-height: 50px; outline: none; }
.soap-field textarea:focus { border-color: var(--purple); }
.soap-save { display: flex; justify-content: flex-end; }
.soap-save button { background: var(--purple); border: none; color: var(--bg); padding: 6px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; }

/* Strategy Planning */
.strategy-panel { padding: 0 14px 14px; display: none; }
.strategy-panel.open { display: block; }
.strategy-field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); resize: vertical; min-height: 60px; outline: none; margin-bottom: 6px; }
.strategy-field textarea:focus { border-color: var(--blue); }
.strategy-field label { display: block; font-size: 11px; color: var(--blue); font-weight: 600; margin-bottom: 3px; }

/* Focus Timer */
.focus-block { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; text-align: center; }
.focus-block .focus-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.focus-block .focus-timer { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
.focus-block .focus-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.focus-block .focus-linked { font-size: 10px; color: var(--amber); margin-top: 4px; }
.focus-block.active { border-color: var(--blue); }
.focus-block.active .focus-timer { color: var(--blue); }
.focus-controls { display: flex; gap: 6px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
.focus-btn { border-radius: var(--radius); padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid; font-family: var(--font); }
.focus-btn.blue { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.focus-btn.blue:hover { background: var(--blue); color: var(--bg); }
.focus-btn.amber { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
.focus-btn.amber:hover { background: var(--amber); color: var(--bg); }
.focus-btn.green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.focus-btn.green:hover { background: var(--green); color: var(--bg); }
.focus-btn.purple { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
.focus-btn.purple:hover { background: var(--purple); color: var(--bg); }
.focus-btn.stop { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.focus-btn.stop:hover { background: var(--red); color: var(--bg); }
.focus-btn.secondary { border-color: var(--border); color: var(--text-dim); background: none; }

/* Ship Cards */
.ship-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
.ship-card:hover { border-color: var(--text-dim); }
.ship-card.shipped { opacity: 0.6; }
.ship-card.shipped .ship-name { text-decoration: line-through; }
.ship-status { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.ship-status.not-started { border-color: var(--text-dim); }
.ship-status.in-progress { border-color: var(--amber); background: var(--amber-bg); }
.ship-status.shipped { border-color: var(--green); background: var(--green-bg); }
.ship-info { flex: 1; min-width: 0; }
.ship-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ship-meta { font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; margin-top: 1px; }
.ship-category { font-size: 9px; padding: 1px 6px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
.ship-category.work { background: var(--blue-bg); color: var(--blue); }
.ship-category.personal { background: var(--green-bg); color: var(--green); }
.ship-category.chore { background: var(--amber-bg); color: var(--amber); }
.ship-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; width: 26px; height: 26px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
.ship-btn:hover { border-color: var(--text-dim); color: var(--text); }
.ship-btn.delete:hover { border-color: var(--red); color: var(--red); }

/* Quick Add */
.quick-add { display: flex; gap: 6px; margin-bottom: 6px; }
.quick-add input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); outline: none; }
.quick-add input:focus { border-color: var(--blue); }
.quick-add input::placeholder { color: var(--text-dim); }
.quick-add-cats { display: flex; gap: 4px; }
.cat-btn { border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 11px; font-weight: 600; cursor: pointer; background: none; }
.cat-btn.work { color: var(--blue); }
.cat-btn.work:hover { background: var(--blue-bg); border-color: var(--blue); }
.cat-btn.personal { color: var(--green); }
.cat-btn.personal:hover { background: var(--green-bg); border-color: var(--green); }
.cat-btn.chore { color: var(--amber); }
.cat-btn.chore:hover { background: var(--amber-bg); border-color: var(--amber); }

/* Collapsible */
.collapsible-header { cursor: pointer; user-select: none; }
.collapsible-header::after { content: ' +'; color: var(--text-dim); font-weight: 400; }
.collapsible-header.open::after { content: ' \2212'; }
.collapsible-body { display: none; margin-top: 6px; }
.collapsible-body.open { display: block; }

/* Backlog */
.backlog-item { display: flex; align-items: center; padding: 7px 10px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 4px; font-size: 12px; gap: 8px; }
.backlog-item .backlog-name { flex: 1; }

/* Goals */
.goal-item { padding: 6px 10px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 3px; font-size: 12px; color: var(--text-dim); }

/* Shutdown Ritual */
.shutdown { background: var(--card); border: 1px solid var(--purple); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.shutdown .sd-title { font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 4px; text-align: center; }
.shutdown .sd-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; text-align: center; }
.shutdown .sd-summary { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; text-align: center; }
.shutdown .sd-section { margin-bottom: 10px; }
.shutdown .sd-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.shutdown input[type="text"], .shutdown textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 12px; font-family: var(--font); outline: none; margin-bottom: 4px; }
.shutdown textarea { resize: vertical; min-height: 40px; }
.shutdown input:focus, .shutdown textarea:focus { border-color: var(--purple); }
.shutdown .sd-plan-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
.shutdown .sd-plan-row .sd-block-label { font-size: 11px; color: var(--text-dim); width: 100px; flex-shrink: 0; }
.shutdown .sd-plan-row input { margin-bottom: 0; }
.shutdown .sd-actions { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }

/* Friday Review */
.friday-review { background: var(--card); border: 1px solid var(--purple); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; text-align: center; }
.friday-review .fr-question { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--purple); }

/* Morning Commit */
.morning-commit { background: var(--card); border: 1px solid var(--blue); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; text-align: center; }
.morning-commit .mc-title { font-size: 14px; font-weight: 600; color: var(--blue); margin-bottom: 2px; }
.morning-commit .mc-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
.morning-commit .mc-blocks { text-align: left; margin-bottom: 10px; }
.morning-commit .mc-block { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius); margin-bottom: 3px; font-size: 12px; }
.morning-commit .mc-block .mc-time { color: var(--text-dim); font-size: 10px; width: 65px; flex-shrink: 0; }
.morning-commit .mc-block .mc-start { font-size: 10px; color: var(--text-dim); font-style: italic; margin-left: auto; }

/* Identity / Export */
.identity-msg { text-align: center; padding: 8px; font-size: 11px; color: var(--green); font-style: italic; }
.footer { text-align: center; padding: 20px 0 10px; font-size: 10px; color: var(--text-dim); }
.footer a { color: var(--text-dim); text-decoration: underline; cursor: pointer; }

/* Modal overlay */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 400px; }
.modal h3 { font-size: 15px; margin-bottom: 12px; }
.modal input, .modal select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 13px; font-family: var(--font); margin-bottom: 10px; outline: none; }
.modal input:focus, .modal select:focus { border-color: var(--blue); }
.modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
.modal-btn { padding: 6px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text); font-family: var(--font); }
.modal-btn.primary { background: var(--blue); border-color: var(--blue); color: var(--bg); }

/* Slide-up confirmation modal */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
.confirm-overlay.open { display: block; }
.confirm-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); z-index: 210; transform: translateY(100%); transition: transform 0.25s ease-out; max-width: 640px; margin: 0 auto; }
.confirm-panel.open { transform: translateY(0); }
.confirm-panel .cp-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.confirm-panel .cp-message { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }
.confirm-panel .cp-actions { display: flex; gap: 8px; }
.confirm-panel .cp-btn { flex: 1; padding: 12px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); text-align: center; }
.confirm-panel .cp-btn.cancel { background: var(--border); color: var(--text-dim); }
.confirm-panel .cp-btn.confirm { background: var(--green); color: var(--bg); }
.confirm-panel .cp-btn.start { background: var(--blue); color: var(--bg); }

@media (max-width: 480px) { body { padding: 10px; } .header h1 { font-size: 17px; } .score-card .value { font-size: 20px; } .focus-block .focus-timer { font-size: 26px; } }
</style>
</head>
<body>

<div id="morning-commit-container"></div>
<div class="verse-bar" id="verse-bar"></div>

<!-- Date Carousel -->
<div class="date-carousel">
  <button class="date-arrow" id="date-prev" onclick="navDate(-1)">&#8249;</button>
  <div class="date-label" id="date-label"></div>
  <button class="date-arrow" id="date-next" onclick="navDate(1)">&#8250;</button>
</div>
<div id="date-back-container"></div>

<div id="todays-reading"></div>
<div class="header"><h1>Stewardship OS</h1><div class="subtitle" id="header-date"></div></div>
<div id="identity-msg"></div>
<div class="scoreboard" id="scoreboard"></div>

<!-- THE FLOW -->
<div class="section-header"><h2>Today's Flow</h2><span class="count" id="flow-count"></span></div>
<div id="daily-flow"></div>

<!-- Focus Timer -->
<div class="focus-block" id="focus-block"></div>

<!-- Ships -->
<div class="section-header"><h2>This Week's Ships</h2><span class="count" id="ships-count"></span></div>
<div id="ships"></div>

<!-- Quick Add -->
<div class="section-header"><h2>Add to Backlog</h2></div>
<div class="quick-add"><input type="text" id="backlog-input" placeholder="What needs to get done?"></div>
<div class="quick-add-cats">
  <button class="cat-btn work" onclick="addBacklogItem('work')">+ Work</button>
  <button class="cat-btn personal" onclick="addBacklogItem('personal')">+ Personal</button>
  <button class="cat-btn chore" onclick="addBacklogItem('chore')">+ Chore</button>
</div>

<!-- Backlog -->
<div class="section-header"><h2 class="collapsible-header" data-target="backlog-body">Backlog</h2><span class="count" id="backlog-count"></span></div>
<div class="collapsible-body" id="backlog-body"><div id="backlog"></div></div>

<!-- Quarterly Goals -->
<div class="section-header"><h2 class="collapsible-header" data-target="goals-body">Quarterly Goals (Q2 2026)</h2></div>
<div class="collapsible-body" id="goals-body"><div id="goals"></div></div>

<div id="evening-review-container"></div>
<div id="friday-review-container"></div>

<div class="footer">
  Whatever you do, work heartily, as for the Lord. — Col 3:23 (ESV)<br>
  <a onclick="exportData()">Export Data</a> | <a onclick="importData()">Import Data</a>
</div>

<!-- Ship Modal -->
<div class="modal-overlay" id="ship-modal"><div class="modal">
  <h3 id="ship-modal-title">New Ship</h3>
  <input type="text" id="ship-name-input" placeholder="What are you shipping this week?">
  <select id="ship-cat-input"><option value="work">Work</option><option value="personal">Personal</option><option value="chore">Chore</option></select>
  <div class="modal-actions"><button class="modal-btn" onclick="closeShipModal()">Cancel</button><button class="modal-btn primary" onclick="saveShip()">Save</button></div>
</div></div>

<!-- Slide-up Confirm Modal -->
<div class="confirm-overlay" id="confirm-overlay" onclick="closeConfirm()"></div>
<div class="confirm-panel" id="confirm-panel"></div>

<script>
// ======================================================
// STEWARDSHIP OS v3 — Sequential Flow + Timer Integration
// ======================================================

// ── Google Sheets Sync ──
// Set this to your deployed Apps Script web app URL to enable cloud sync.
// See: https://developers.google.com/apps-script/guides/web
const SHEET_URL = 'YOUR_APPS_SCRIPT_URL';

function sheetsSyncEnabled() { return SHEET_URL && SHEET_URL !== 'YOUR_APPS_SCRIPT_URL'; }

function syncCompletion(date, stepId, stepLabel, done) {
  if (!sheetsSyncEnabled()) return;
  const payload = { type: 'completion', date, stepId, stepLabel, done, timestamp: new Date().toISOString() };
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).catch(() => {});
}

function syncSOAP(date, soapData) {
  if (!sheetsSyncEnabled()) return;
  const payload = { type: 'soap', date, scripture: soapData.scripture || '', observation: soapData.observation || '', application: soapData.application || '', prayer: soapData.prayer || '', reading: soapData.reading || '' };
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).catch(() => {});
}

function syncFullBackup() {
  if (!sheetsSyncEnabled()) return;
  const payload = { type: 'full-sync', payload: APP };
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).catch(() => {});
}

function tryRestoreFromCloud() {
  if (!sheetsSyncEnabled()) return;
  const hasData = Object.keys(APP.flow || {}).length > 0;
  if (hasData) { syncFullBackup(); return; }
  fetch(SHEET_URL)
    .then(r => r.json())
    .then(data => {
      if (data && data.flow && Object.keys(data.flow).length > 0) {
        APP = data;
        saveData(APP);
        render();

  ...[1,2,3,4,5].map(c => ({ book: "James", chapter: c })),
  ...Array.from({length: 31}, (_, i) => ({ book: "Proverbs", chapter: i+1 })),
  ...Array.from({length: 21}, (_, i) => ({ book: "John", chapter: i+1 })),
  ...[1,2,3,4,5,6].map(c => ({ book: "Ephesians", chapter: c })),
];

function getReadingForDate(dateStr) {
  const start = new Date(2026, 2, 24);
  const target = parseDate(dateStr);
  const diff = Math.floor((target - start) / 86400000);
  const idx = ((diff % READING_PLAN.length) + READING_PLAN.length) % READING_PLAN.length;
  return { ...READING_PLAN[idx], planDay: idx + 1, totalDays: READING_PLAN.length };
}

// ── Utilities ──
function todayStr() { return new Date().toISOString().slice(0, 10); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function dateStr(d) { return d.toISOString().slice(0, 10); }
function addDays(s, n) { const d = parseDate(s); d.setDate(d.getDate() + n); return dateStr(d); }
function getWeekOf(date) { const d = date ? new Date(date) : new Date(); d.setDate(d.getDate() - d.getDay() + 1); return d.toISOString().slice(0,10); }
function getWeekId(date) { const d = date ? new Date(date) : new Date(); const j = new Date(d.getFullYear(),0,1); return d.getFullYear()+'-W'+String(Math.ceil(((d-j)/86400000+j.getDay()+1)/7)).padStart(2,'0'); }
function isFriday() { return new Date().getDay() === 5; }
function isMonday() { return new Date().getDay() === 1; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function dayOfYear() { const n = new Date(); return Math.floor((n - new Date(n.getFullYear(),0,0)) / 86400000); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function tomorrowDate() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function parseTime(t) { const [time, ap] = t.split(' '); let [h,m] = time.split(':').map(Number); if (ap==='PM'&&h!==12) h+=12; if (ap==='AM'&&h===12) h=0; return h*60+m; }

function formatDateLabel(dateString) {
  const d = parseDate(dateString);
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

// ══════════════════════════
// FLOW TAP HANDLER + TIMER INTEGRATION
// ══════════════════════════
function handleFlowTap(id) {
  const d = selectedDate;
  if (!APP.flow[d]) { APP.flow[d] = {}; FLOW_STEPS.forEach(s => APP.flow[d][s.id] = false); }
  const step = FLOW_STEPS.find(s => s.id === id);
  const isDone = APP.flow[d][id];
  const isToday = d === todayStr();

  // If unchecking (already done), just toggle off
  if (isDone) {
    if (id === 'bible') saveSOAP();
    if (id === 'strategy') saveStrategy();
    APP.flow[d][id] = false;
    saveData(APP);
    syncCompletion(d, id, step.label, false);
    renderFlow();
    return;
  }

  // Save associated panels
  if (id === 'bible') saveSOAP();
  if (id === 'strategy') saveStrategy();

  // Meditation on-time tracking
  if (id === 'meditation' && isToday) {
    const now = new Date();
    const targetMin = parseTime('10:00 AM');
    const nowMin = now.getHours()*60 + now.getMinutes();
    APP.meditation[d] = { startedAt: Date.now(), onTime: nowMin <= targetMin + 2 };
  }

  // Timer-linked steps: walk, dw1, dw2, clearing, meditation
  if (step.timerType && isToday) {
    // Check if a matching timer is running or was completed today
    const timerCompleted = APP.timerCompletions[d] && APP.timerCompletions[d][id];
    const timerRunningForThis = focusTimer && focusTimer.linkedStepId === id;

    if (timerCompleted || timerRunningForThis) {
      // Timer ran or is running for this step -- auto-check
      completeFlowStep(id);
      return;
    }

    // Check if a timer of the same type completed for any step
    if (focusTimer && focusTimer.type === step.timerType) {
      completeFlowStep(id);
      return;
    }

    // No timer ran -- show confirmation modal
    const timerMins = step.timerMins || 30;
    showConfirm(
      step.label,
      'No timer was recorded for this step. What would you like to do?',
      [
        { label: 'Cancel', cls: 'cancel', onclick: 'closeConfirm()' },
        { label: 'Already Done', cls: 'confirm', onclick: 'closeConfirm();completeFlowStep("'+id+'")' },
        { label: 'Start ' + timerMins + 'm Timer', cls: 'start', onclick: 'closeConfirm();startFocusTimer("'+step.timerType+'",'+timerMins+',"'+id+'")' },
      ]
    );
    return;
  }

  // Non-timer steps: just toggle
  completeFlowStep(id);
}

function completeFlowStep(id) {
  const d = selectedDate;
  if (!APP.flow[d]) { APP.flow[d] = {}; FLOW_STEPS.forEach(s => APP.flow[d][s.id] = false); }
  const step = FLOW_STEPS.find(s => s.id === id);
  APP.flow[d][id] = true;
  saveData(APP);
  syncCompletion(d, id, step ? step.label : id, true);
  renderFlow();
}

// ══════════════════════════
// FOCUS TIMER
// ══════════════════════════
function startFocusTimer(type, mins, linkedStepId) {
  focusTimer = { startedAt: Date.now(), duration: mins * 60000, type: type, linkedStepId: linkedStepId || null };
  if (focusTimerInterval) clearInterval(focusTimerInterval);
  focusTimerInterval = setInterval(tickFocusTimer, 1000);
  renderFocusBlock();
}

function tickFocusTimer() {
  if (!focusTimer) { clearInterval(focusTimerInterval); focusTimerInterval = null; return; }
  const elapsed = Date.now() - focusTimer.startedAt;
  const remaining = focusTimer.duration - elapsed;
  if (remaining <= 0) {
    // Timer completed
    const d = todayStr();
    const stepId = focusTimer.linkedStepId;
    const actualMins = Math.round(focusTimer.duration / 60000);

    // Record timer completion
    if (!APP.timerCompletions[d]) APP.timerCompletions[d] = {};
    if (stepId) {
      APP.timerCompletions[d][stepId] = { mins: actualMins, completedAt: Date.now() };
      // Auto-check the linked flow step
      if (APP.flow[d] && !APP.flow[d][stepId]) {
        APP.flow[d][stepId] = true;
        const step = FLOW_STEPS.find(s => s.id === stepId);
        syncCompletion(d, stepId, step ? step.label : stepId, true);
      }
    }

    saveData(APP);
    focusTimer = null;
    clearInterval(focusTimerInterval);
    focusTimerInterval = null;
    renderFlow();
  }
  renderFocusBlock();
}

function stopFocusTimer() {
  if (focusTimer) {
    const elapsed = Date.now() - focusTimer.startedAt;
    const actualMins = Math.round(elapsed / 60000);
    const stepId = focusTimer.linkedStepId;
    const d = todayStr();

    if (actualMins > 0 && stepId) {
      if (!APP.timerCompletions[d]) APP.timerCompletions[d] = {};
      APP.timerCompletions[d][stepId] = { mins: actualMins, completedAt: Date.now() };

      const step = FLOW_STEPS.find(s => s.id === stepId);
      const targetMins = step ? step.timerMins : 30;

      if (actualMins < targetMins) {
        // Partial completion
        showConfirm(
          'Timer Stopped Early',
          'You did ' + actualMins + ' of ' + targetMins + ' minutes. Mark as complete?',
          [
            { label: 'No', cls: 'cancel', onclick: 'closeConfirm()' },
            { label: 'Yes, Mark Complete', cls: 'confirm', onclick: 'closeConfirm();completeFlowStep("'+stepId+'")' },
          ]
        );
      }
      saveData(APP);
    }
  }
  focusTimer = null;
  if (focusTimerInterval) { clearInterval(focusTimerInterval); focusTimerInterval = null; }
  renderFocusBlock();
}

function getNextDeepWorkStep() {
  const d = todayStr();
  if (!APP.flow[d]) return 'dw1';
  if (!APP.flow[d].dw1) return 'dw1';
  if (!APP.flow[d].dw2) return 'dw2';

function renderFocusBlock() {
  const el = document.getElementById('focus-block');
  if (focusTimer) {
    const elapsed = Date.now() - focusTimer.startedAt;
    const remaining = Math.max(0, focusTimer.duration - elapsed);
    const mins = Math.floor(remaining/60000);
    const secs = Math.floor((remaining%60000)/1000);
    const typeLabels = { 'deep-work': 'Deep Work', 'clearing': 'Task Clearing', 'treadmill': 'Treadmill Walk', 'meditation': 'Meditation' };
    const label = typeLabels[focusTimer.type] || 'Focus';
    const linkedStep = focusTimer.linkedStepId ? FLOW_STEPS.find(s => s.id === focusTimer.linkedStepId) : null;
    const linkedLabel = linkedStep ? '<div class="focus-linked">Linked to: ' + linkedStep.label + '</div>' : '';
    el.className = 'focus-block active';
    el.innerHTML =
      '<div class="focus-label">' + label + ': As Unto the Lord</div>' +
      '<div class="focus-timer">' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '</div>' +
      '<div class="focus-sub">' + (remaining<=0?'Complete!':'Stay focused. Finish strong.') + '</div>' +
      linkedLabel +
      '<div class="focus-controls"><button class="focus-btn stop" onclick="stopFocusTimer()">Stop</button></div>';
  } else {
    const plan = APP.tomorrowPlan?.[todayStr()] || {};
    const hint = plan.dw1 ? '<div class="focus-sub" style="margin-bottom:6px;">Planned: ' + esc(plan.dw1) + '</div>' : '';
    const nextDW = getNextDeepWorkStep();

    el.className = 'focus-block';
    el.innerHTML =
      '<div class="focus-label">Start a Focus Block</div>' +
      '<div class="focus-timer">--:--</div>' + hint +
      '<div class="focus-controls">' +
        '<button class="focus-btn blue" onclick="startFocusTimer(\'deep-work\',90,\'' + (nextDW || '') + '\')">Deep Work (90m)</button>' +
        '<button class="focus-btn amber" onclick="startFocusTimer(\'clearing\',10,\'clearing\')">Clearing (10m)</button>' +
        '<button class="focus-btn green" onclick="startFocusTimer(\'treadmill\',30,\'walk\')">Treadmill (30m)</button>' +
        '<button class="focus-btn purple" onclick="startFocusTimer(\'meditation\',10,\'meditation\')">Meditate (10m)</button>' +
      '</div>';
  }
}

// ══════════════════════════
// SHIPS
// ══════════════════════════
function renderShips() {
  const weekOf = getWeekOf(); const cs = APP.ships.filter(s=>s.weekOf===weekOf);
  document.getElementById('ships-count').textContent = cs.length + '/3';
  let html = '';
  cs.forEach(s => {
    const icon = s.status==='shipped'?'&#10003;':s.status==='in-progress'?'&#9679;':'';
    html += '<div class="ship-card '+(s.status==='shipped'?'shipped':'')+'" onclick="cycleShip(\''+s.id+'\')"><div class="ship-status '+s.status+'">'+icon+'</div><div class="ship-info"><div class="ship-name">'+esc(s.name)+'</div><div class="ship-meta"><span class="ship-category '+s.category+'">'+s.category+'</span></div></div><div style="display:flex;gap:4px"><button class="ship-btn" onclick="event.stopPropagation();editShip(\''+s.id+'\')" title="Edit">&#9998;</button><button class="ship-btn delete" onclick="event.stopPropagation();deleteShip(\''+s.id+'\')">&#10005;</button></div></div>';
  });
  if (cs.length < 3) html += '<div class="ship-card" onclick="openShipModal()" style="justify-content:center;color:var(--text-dim);border-style:dashed;">+ Add Ship ('+(3-cs.length)+' remaining)</div>';
  document.getElementById('ships').innerHTML = html;
}
function cycleShip(id) { const s=APP.ships.find(x=>x.id===id); if(!s)return; const c=['not-started','in-progress','shipped']; s.status=c[(c.indexOf(s.status)+1)%3]; saveData(APP); renderShips(); renderScoreboard(); }
function openShipModal(editId) {
  const m=document.getElementById('ship-modal'),t=document.getElementById('ship-modal-title'),n=document.getElementById('ship-name-input'),c=document.getElementById('ship-cat-input');
  if(editId){const s=APP.ships.find(x=>x.id===editId);t.textContent='Edit Ship';n.value=s.name;c.value=s.category;m.dataset.editId=editId;}
  else{t.textContent='New Ship';n.value='';c.value='work';delete m.dataset.editId;}
  m.classList.add('open');n.focus();
}
function closeShipModal(){document.getElementById('ship-modal').classList.remove('open');}
function saveShip(){const n=document.getElementById('ship-name-input'),c=document.getElementById('ship-cat-input'),m=document.getElementById('ship-modal'),name=n.value.trim();if(!name)return;if(m.dataset.editId){const s=APP.ships.find(x=>x.id===m.dataset.editId);s.name=name;s.category=c.value;}else{APP.ships.push({id:uid(),name,category:c.value,status:'not-started',weekOf:getWeekOf()});}saveData(APP);closeShipModal();renderShips();renderScoreboard();}
function editShip(id){openShipModal(id);}
function deleteShip(id){APP.ships=APP.ships.filter(s=>s.id!==id);saveData(APP);renderShips();renderScoreboard();}

// ══════════════════════════
// BACKLOG
// ══════════════════════════
function renderBacklog(){document.getElementById('backlog-count').textContent=APP.backlog.length+' items';let h='';APP.backlog.forEach(i=>{h+='<div class="backlog-item"><span class="ship-category '+i.category+'">'+i.category+'</span><span class="backlog-name">'+esc(i.name)+'</span><div style="display:flex;gap:4px"><button class="ship-btn" onclick="promoteToShip(\''+i.id+'\')" title="Promote">&#8593;</button><button class="ship-btn delete" onclick="deleteBacklog(\''+i.id+'\')">&#10005;</button></div></div>';});if(!APP.backlog.length)h='<div class="backlog-item" style="color:var(--text-dim);justify-content:center;">No items yet</div>';document.getElementById('backlog').innerHTML=h;}
function addBacklogItem(cat){const inp=document.getElementById('backlog-input'),name=inp.value.trim();if(!name)return;APP.backlog.push({id:uid(),name,category:cat,createdAt:todayStr()});saveData(APP);inp.value='';renderBacklog();}
function deleteBacklog(id){APP.backlog=APP.backlog.filter(b=>b.id!==id);saveData(APP);renderBacklog();}
function promoteToShip(id){const item=APP.backlog.find(b=>b.id===id);if(!item)return;const cs=APP.ships.filter(s=>s.weekOf===getWeekOf());if(cs.length>=3){showConfirm('Ships Full','3 ships max. Finish or remove one first.',[{label:'OK',cls:'confirm',onclick:'closeConfirm()'}]);return;}APP.ships.push({id:uid(),name:item.name,category:item.category,status:'not-started',weekOf:getWeekOf()});APP.backlog=APP.backlog.filter(b=>b.id!==id);saveData(APP);renderShips();renderBacklog();renderScoreboard();}

// ══════════════════════════
// GOALS
// ══════════════════════════
function renderGoals(){let h='<div style="margin-bottom:6px;font-size:11px;color:var(--blue);font-weight:600;">WORK</div>';GOALS.work.forEach(g=>{h+='<div class="goal-item">'+esc(g)+'</div>';});h+='<div style="margin:10px 0 6px;font-size:11px;color:var(--green);font-weight:600;">PERSONAL</div>';GOALS.personal.forEach(g=>{h+='<div class="goal-item">'+esc(g)+'</div>';});document.getElementById('goals').innerHTML=h;}

// ══════════════════════════
// MORNING COMMIT
// ══════════════════════════
const ANCHOR_BLOCKS = [
  { time:"6:00 AM", label:"Quiet Time", type:"faith" },
  { time:"6:30 AM", label:"Treadmill Walk + Light", type:"health" },
  { time:"10:00 AM", label:"Meditation (10 min)", type:"faith" },
  { time:"10:10 AM", label:"Strategy Planning", type:"deepwork" },
  { time:"10:20 AM", label:"Deep Work Block 1", type:"deepwork" },
  { time:"11:50 AM", label:"Task Clearing (10 min)", type:"chore" },
  { time:"12:00 PM", label:"Deep Work Block 2", type:"deepwork" },
  { time:"6:00 PM", label:"Family Time", type:"family" },
];

function renderMorningCommit(){
  const c=document.getElementById('morning-commit-container'),h=new Date().getHours(),d=todayStr();
  if(!APP.morningCommit)APP.morningCommit={};if(!APP.tomorrowPlan)APP.tomorrowPlan={};
  if(h<10&&!APP.morningCommit[d]&&selectedDate===todayStr()){
    const plan=APP.tomorrowPlan[d]||{},r=getReadingForDate(d);
    const colors={faith:'rgba(188,140,255,0.1)',health:'var(--green-bg)',deepwork:'var(--blue-bg)',family:'rgba(248,81,73,0.1)',chore:'var(--amber-bg)'};
    let blocks='';ANCHOR_BLOCKS.forEach(b=>{
      let hint='';
      if(b.label==='Quiet Time')hint=r.book+' '+r.chapter+' (SOAP)';
      else if(b.label.includes('Deep Work 1')&&plan.dw1)hint=plan.dw1;
      else if(b.label.includes('Deep Work 2')&&plan.dw2)hint=plan.dw2;
      else if(b.label==='Family Time'&&plan.family)hint=plan.family;
      blocks+='<div class="mc-block" style="background:'+colors[b.type]+'"><span class="mc-time">'+b.time+'</span><span>'+b.label+'</span>'+(hint?'<span class="mc-start">'+esc(hint)+'</span>':'')+'</div>';
    });
    let loops='';if(plan.openLoops)loops='<div style="font-size:11px;color:var(--text-dim);margin-top:8px;padding:6px 10px;background:var(--bg);border-radius:var(--radius);text-align:left;"><span style="color:var(--amber);font-weight:600;">Open loops:</span> '+esc(plan.openLoops)+'</div>';
    const src=plan.dw1?'Planned last night. No decisions needed.':'Commit to these. Everything else flexes.';
    c.innerHTML='<div class="morning-commit"><div class="mc-title">Today\'s Anchor Blocks</div><div class="mc-sub">'+src+'</div><div class="mc-blocks">'+blocks+'</div>'+loops+'<button class="focus-btn blue" onclick="commitMorning()" style="margin-top:10px">I commit to today</button></div>';
  } else c.innerHTML='';
}
function commitMorning(){if(!APP.morningCommit)APP.morningCommit={};APP.morningCommit[todayStr()]=true;saveData(APP);renderMorningCommit();}

// ══════════════════════════
// SHUTDOWN RITUAL
// ══════════════════════════
function renderShutdownRitual(){
  const c=document.getElementById('evening-review-container'),h=new Date().getHours(),d=todayStr();
  if(!APP.shutdowns)APP.shutdowns={};if(!APP.tomorrowPlan)APP.tomorrowPlan={};
  if(h>=17&&!APP.shutdowns[d]&&selectedDate===todayStr()){
    const fd=APP.flow[d]||{};const done=Object.values(fd).filter(Boolean).length;
    const weekOf=getWeekOf(),cs=APP.ships.filter(s=>s.weekOf===weekOf);
    const shipped=cs.filter(s=>s.status==='shipped').length,ip=cs.filter(s=>s.status==='in-progress').length;
    const tmrw=tomorrowDate(),ep=APP.tomorrowPlan[tmrw]||{};
    c.innerHTML='<div class="shutdown"><div class="sd-title">Shutdown Ritual</div><div class="sd-sub">Review today. Plan tomorrow. Then rest.</div>'+
      '<div class="sd-summary">Today: '+done+'/'+FLOW_STEPS.length+' flow steps | Ships: '+shipped+' shipped, '+ip+' in progress</div>'+
      '<div class="sd-section"><div class="sd-label">What worked today?</div><textarea id="sd-worked" placeholder="One thing that went well...">'+(ep.worked||'')+'</textarea></div>'+
      '<div class="sd-section"><div class="sd-label">Tomorrow\'s Priorities</div>'+
        '<div class="sd-plan-row"><span class="sd-block-label">Deep Work 1:</span><input type="text" id="sd-dw1" placeholder="What will you work on?" value="'+esc(ep.dw1||'')+'"></div>'+
        '<div class="sd-plan-row"><span class="sd-block-label">Deep Work 2:</span><input type="text" id="sd-dw2" placeholder="Next priority..." value="'+esc(ep.dw2||'')+'"></div>'+
        '<div class="sd-plan-row"><span class="sd-block-label">Top Chore:</span><input type="text" id="sd-chore" placeholder="One chore..." value="'+esc(ep.chore||'')+'"></div>'+
        '<div class="sd-plan-row"><span class="sd-block-label">Family Focus:</span><input type="text" id="sd-family" placeholder="Something intentional..." value="'+esc(ep.family||'')+'"></div>'+
      '</div>'+
      '<div class="sd-section"><div class="sd-label">Open loops (capture so you can let go)</div><textarea id="sd-openloops" placeholder="Worries, ideas, to-dos...">'+(ep.openLoops||'')+'</textarea></div>'+
      '<div class="sd-actions"><button class="focus-btn purple" onclick="completeShutdown()">Shutdown Complete</button></div></div>';
  } else c.innerHTML='';
}
function completeShutdown(){if(!APP.shutdowns)APP.shutdowns={};if(!APP.tomorrowPlan)APP.tomorrowPlan={};const t=tomorrowDate();APP.shutdowns[todayStr()]={completedAt:Date.now()};APP.tomorrowPlan[t]={dw1:document.getElementById('sd-dw1')?.value||'',dw2:document.getElementById('sd-dw2')?.value||'',chore:document.getElementById('sd-chore')?.value||'',family:document.getElementById('sd-family')?.value||'',openLoops:document.getElementById('sd-openloops')?.value||'',worked:document.getElementById('sd-worked')?.value||''};saveData(APP);renderShutdownRitual();}

// ══════════════════════════
// FRIDAY REVIEW
// ══════════════════════════
function renderFridayReview(){const c=document.getElementById('friday-review-container'),wk=getWeekId();if(isFriday()&&!APP.fridayReviewed?.[wk]&&selectedDate===todayStr()){c.innerHTML='<div class="friday-review"><div class="fr-question">Did I steward my time faithfully this week?</div><div style="display:flex;gap:6px;justify-content:center;"><button class="focus-btn purple" onclick="completeFridayReview()">Score This Week</button></div></div>';}else c.innerHTML='';}
function completeFridayReview(){const wo=getWeekOf(),wk=getWeekId(),cs=APP.ships.filter(s=>s.weekOf===wo),sh=cs.filter(s=>s.status==='shipped').length;APP.weekHistory.push({weekOf:wo,shipped:sh,total:cs.length||3});if(!APP.fridayReviewed)APP.fridayReviewed={};APP.fridayReviewed[wk]=true;saveData(APP);renderScoreboard();renderFridayReview();}

// ══════════════════════════
// IDENTITY
// ══════════════════════════
function renderIdentityMessage(){const el=document.getElementById('identity-msg');const dates=Object.keys(APP.flow||{}).sort();if(dates.length<7){el.innerHTML='';return;}let good=0;dates.slice(-28).forEach(d=>{const f=APP.flow[d];if(!f)return;const done=Object.values(f).filter(Boolean).length;if(done>=Math.ceil(FLOW_STEPS.length/2))good++;});const wks=Math.floor(good/5);if(wks>=4)el.innerHTML='<div class="identity-msg">'+wks+' weeks of faithful stewardship. This is who you are now.</div>';else if(wks>=2)el.innerHTML='<div class="identity-msg">'+wks+' weeks of showing up. Building the pattern.</div>';else el.innerHTML='';}

// ══════════════════════════
// WEEK ROLLOVER
// ══════════════════════════
function checkWeekRollover(){if(!isMonday())return;const wo=getWeekOf();if(!APP.ships.some(s=>s.weekOf===wo)){const lw=new Date();lw.setDate(lw.getDate()-7);const lwo=getWeekOf(lw),ls=APP.ships.filter(s=>s.weekOf===lwo);if(ls.length>0&&!APP.weekHistory.some(w=>w.weekOf===lwo)){APP.weekHistory.push({weekOf:lwo,shipped:ls.filter(s=>s.status==='shipped').length,total:ls.length});saveData(APP);}}}

// ══════════════════════════
// DATA EXPORT/IMPORT
// ══════════════════════════
function exportData(){const blob=new Blob([JSON.stringify(APP,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stewardship-os-backup-'+todayStr()+'.json';a.click();}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{APP=JSON.parse(ev.target.result);saveData(APP);render();}catch(err){showConfirm('Import Error','Invalid file format.',[{label:'OK',cls:'confirm',onclick:'closeConfirm()'}]);}};r.readAsText(f);};inp.click();}

// ══════════════════════════
// COLLAPSIBLES
// ══════════════════════════
document.querySelectorAll('.collapsible-header').forEach(h=>{h.addEventListener('click',()=>{const b=document.getElementById(h.dataset.target);h.classList.toggle('open');b.classList.toggle('open');});});

// ══════════════════════════
// KEYBOARD
// ══════════════════════════
document.getElementById('backlog-input').addEventListener('keydown',e=>{if(e.key==='Enter')addBacklogItem('work');});
document.getElementById('ship-name-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveShip();if(e.key==='Escape')closeShipModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeShipModal();closeConfirm();}});

// ══════════════════════════
// INIT
// ══════════════════════════
function render(){
  checkWeekRollover();
  renderMorningCommit();
  renderVerse();
  renderDateCarousel();
  renderReading();
  renderHeader();
  renderIdentityMessage();
  renderScoreboard();
  renderFlow();
  renderFocusBlock();
  renderShips();
  renderBacklog();
  renderGoals();
  renderShutdownRitual();
  renderFridayReview();
}

render();
tryRestoreFromCloud();
setInterval(()=>{ renderFlow(); }, 60000);
</script>
